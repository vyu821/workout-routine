<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hunter Stats">
<meta name="theme-color" content="#03030e">
<title>Hunter Stats</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#03030e;--surface:#08081a;--surface2:#0d0d22;--surface3:#12122e;
  --border:#1a1a3a;--border2:#242450;
  --blue:#4a9eff;--blue2:#2266cc;--blue-dim:#0e2244;
  --purple:#7744ff;--gold:#ffd700;--gold-dim:#3a2e00;
  --green:#26c47a;--text:#c8d8f0;--muted:#5060a0;--dim:#252545;
  --push:#e85d26;--pull:#2688e8;--legs:#26c47a;--abs:#e8c426;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-top:env(safe-area-inset-top,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;
  display:flex;flex-direction:column;position:relative;}

/* ambient glow */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -5%,rgba(30,80,200,0.12) 0%,transparent 65%),
    radial-gradient(ellipse 50% 40% at 15% 60%,rgba(20,50,150,0.08) 0%,transparent 55%),
    radial-gradient(ellipse 40% 30% at 85% 70%,rgba(70,30,180,0.07) 0%,transparent 55%);}

/* TOP BAR */
.top-bar{flex-shrink:0;z-index:10;position:relative;
  padding:13px 16px 11px;padding-top:max(13px,var(--safe-top));
  border-bottom:1px solid var(--border);
  background:rgba(3,3,14,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
.top-bar-inner{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.top-bar h1{font-family:'Orbitron',sans-serif;font-weight:900;font-size:1rem;
  letter-spacing:3px;text-transform:uppercase;color:var(--blue);
  text-shadow:0 0 20px rgba(74,158,255,0.7),0 0 40px rgba(74,158,255,0.3);}
.back-btn{font-family:'Orbitron',sans-serif;font-size:0.6rem;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--muted);
  text-decoration:none;padding:5px 10px;border:1px solid var(--border);
  border-radius:5px;transition:all 0.2s;}
.back-btn:hover{color:var(--blue);border-color:var(--blue-dim);}
.rank-badge{font-family:'Orbitron',sans-serif;font-weight:700;font-size:0.75rem;
  letter-spacing:3px;padding:4px 11px;border-radius:4px;border:1px solid;transition:all 0.5s;}
.rank-E{color:#556677;border-color:#223344;background:rgba(30,40,60,0.4);}
.rank-D{color:#5588cc;border-color:#1a4488;background:rgba(10,30,80,0.4);}
.rank-C{color:#33bbaa;border-color:#115544;background:rgba(5,40,35,0.4);}
.rank-B{color:#9966ff;border-color:#441188;background:rgba(30,10,70,0.4);}
.rank-A{color:#ff8822;border-color:#883300;background:rgba(50,20,0,0.4);}
.rank-S{color:var(--gold);border-color:rgba(255,215,0,0.6);background:rgba(60,45,0,0.5);
  box-shadow:0 0 15px rgba(255,215,0,0.3),inset 0 0 15px rgba(255,215,0,0.05);
  animation:rankPulse 3s ease-in-out infinite;}
@keyframes rankPulse{0%,100%{box-shadow:0 0 10px rgba(255,215,0,0.2);}
  50%{box-shadow:0 0 25px rgba(255,215,0,0.5),0 0 50px rgba(255,215,0,0.15);}}

/* SCROLL */
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;position:relative;z-index:1;
  padding:12px 12px calc(16px + var(--safe-bottom));}

/* TABS */
.tab-row{display:flex;gap:4px;margin-bottom:14px;background:var(--surface);
  border:1px solid var(--border);border-radius:8px;padding:3px;}
.tab-btn{flex:1;padding:7px 4px;border:none;border-radius:6px;background:transparent;
  color:var(--muted);cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:600;
  font-size:0.72rem;letter-spacing:1.5px;text-transform:uppercase;transition:all 0.2s;}
.tab-btn.active{background:rgba(74,158,255,0.15);color:var(--blue);
  box-shadow:inset 0 0 0 1px rgba(74,158,255,0.3);
  text-shadow:0 0 12px rgba(74,158,255,0.5);}
.tab-content{display:none;}
.tab-content.active{display:block;animation:fadeUp 0.18s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}

/* SECTION LABEL */
.section-label{font-family:'Orbitron',sans-serif;font-size:0.52rem;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;color:var(--muted);
  padding-bottom:7px;margin-bottom:10px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;}
.section-label::before{content:'';width:2px;height:10px;border-radius:1px;flex-shrink:0;
  background:linear-gradient(180deg,var(--blue),var(--purple));
  box-shadow:0 0 8px rgba(74,158,255,0.8);}

/* PROFILE CARD */
.profile-card{background:linear-gradient(135deg,var(--surface),var(--surface2));
  border:1px solid var(--border2);border-radius:12px;padding:13px 15px;
  margin-bottom:12px;position:relative;overflow:hidden;}
.profile-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(74,158,255,0.6),rgba(120,80,255,0.6),transparent);}
.profile-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:60px;
  background:linear-gradient(0deg,rgba(74,158,255,0.03),transparent);pointer-events:none;}
.profile-top{display:flex;align-items:center;gap:11px;margin-bottom:11px;}
.hunter-avatar{width:42px;height:42px;border-radius:50%;
  background:radial-gradient(circle,rgba(74,158,255,0.2),rgba(70,30,180,0.2));
  border:1px solid rgba(74,158,255,0.4);
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;
  box-shadow:0 0 15px rgba(74,158,255,0.2);}
.hunter-name{font-family:'Orbitron',sans-serif;font-size:0.9rem;font-weight:700;
  color:var(--text);letter-spacing:1px;}
.hunter-title{font-size:0.65rem;color:var(--muted);letter-spacing:1.5px;margin-top:2px;text-transform:uppercase;}
.xp-label-row{display:flex;justify-content:space-between;margin-bottom:4px;}
.xp-label{font-size:0.62rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.xp-val{font-family:'Orbitron',sans-serif;font-size:0.75rem;font-weight:700;color:var(--blue);}
.overall-bar-wrap{height:4px;background:var(--dim);border-radius:2px;overflow:hidden;margin-bottom:10px;
  box-shadow:inset 0 0 8px rgba(0,0,0,0.5);}
.overall-bar{height:100%;border-radius:2px;
  background:linear-gradient(90deg,var(--blue2),var(--blue),var(--purple));
  transition:width 1s cubic-bezier(0.4,0,0.2,1);
  box-shadow:0 0 8px rgba(74,158,255,0.6);}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;}
.stat-mini{background:var(--surface3);border:1px solid var(--border);border-radius:7px;padding:6px 8px;text-align:center;}
.stat-mini-val{font-family:'Orbitron',sans-serif;font-size:0.95rem;font-weight:700;color:var(--blue);line-height:1;}
.stat-mini-label{font-size:0.52rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}

/* ═══════════════════════
   BODY DIAGRAM
═══════════════════════ */
.body-svg-wrap{width:100%;position:relative;margin-bottom:4px;}
.body-svg-wrap svg{width:100%;height:auto;display:block;overflow:visible;}

/* QUESTS */
.quest-card{background:var(--surface);border:1px solid var(--border);border-radius:9px;
  padding:11px 13px;margin-bottom:6px;position:relative;overflow:hidden;}
.quest-card.active-quest{border-color:rgba(74,158,255,0.25);}
.quest-card.active-quest::before{content:'';position:absolute;top:0;left:0;bottom:0;
  width:2px;background:linear-gradient(180deg,var(--blue),var(--purple));}
.quest-card.complete-quest{border-color:rgba(38,196,122,0.18);opacity:0.55;}
.quest-card.complete-quest::before{content:'';position:absolute;top:0;left:0;bottom:0;
  width:2px;background:var(--green);}
.quest-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:5px;}
.quest-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:0.82rem;
  letter-spacing:0.5px;text-transform:uppercase;color:var(--text);line-height:1.2;}
.quest-type{font-size:0.5rem;letter-spacing:1.5px;text-transform:uppercase;
  padding:2px 6px;border-radius:3px;white-space:nowrap;flex-shrink:0;margin-top:1px;}
.quest-type.daily{background:rgba(74,158,255,0.12);color:var(--blue);border:1px solid rgba(74,158,255,0.2);}
.quest-type.weekly{background:rgba(119,68,255,0.12);color:var(--purple);border:1px solid rgba(119,68,255,0.2);}
.quest-type.milestone{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(255,215,0,0.2);}
.quest-desc{font-size:0.65rem;color:var(--muted);margin-bottom:6px;line-height:1.5;}
.quest-prog-row{display:flex;align-items:center;gap:7px;}
.quest-bar-wrap{flex:1;height:2px;background:var(--dim);border-radius:1px;overflow:hidden;}
.quest-bar{height:100%;border-radius:1px;
  background:linear-gradient(90deg,var(--blue2),var(--blue));transition:width 0.8s ease;}
.quest-bar.done{background:var(--green);}
.quest-pct{font-family:'Orbitron',sans-serif;font-size:0.55rem;color:var(--muted);white-space:nowrap;}
.quest-reward{font-size:0.6rem;color:var(--gold);margin-top:4px;}

/* ACHIEVEMENTS */
.achievement-grid{display:flex;flex-direction:column;gap:6px;}
.achievement{background:var(--surface);border:1px solid var(--border);border-radius:9px;
  padding:10px 12px;display:flex;align-items:center;gap:10px;position:relative;overflow:hidden;}
.achievement.unlocked{border-color:rgba(255,215,0,0.2);}
.achievement.unlocked::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,215,0,0.5),transparent);}
.achievement.locked{opacity:0.35;filter:grayscale(0.8);}
.ach-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-size:0.95rem;flex-shrink:0;}
.achievement.unlocked .ach-icon{background:linear-gradient(135deg,var(--gold-dim),rgba(60,45,0,0.5));
  border:1px solid rgba(255,215,0,0.2);}
.achievement.locked .ach-icon{background:var(--surface2);border:1px solid var(--border);}
.ach-body{flex:1;min-width:0;}
.ach-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:0.82rem;
  letter-spacing:0.5px;text-transform:uppercase;}
.achievement.unlocked .ach-name{color:var(--gold);}
.achievement.locked .ach-name{color:var(--text);}
.ach-desc{font-size:0.62rem;color:var(--muted);margin-top:1px;line-height:1.4;}
.ach-right{flex-shrink:0;font-size:0.9rem;}
.ach-check{color:var(--gold);}
.ach-lock{color:var(--dim);}

/* NOTIFICATION */
.notif{position:fixed;top:max(74px,calc(74px + var(--safe-top)));left:50%;
  transform:translateX(-50%) translateY(-14px);
  background:rgba(5,5,20,0.97);border:1px solid rgba(255,215,0,0.5);border-radius:8px;
  padding:9px 16px;z-index:500;opacity:0;
  transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none;white-space:nowrap;
  box-shadow:0 0 20px rgba(255,215,0,0.25);text-align:center;}
.notif.show{opacity:1;transform:translateX(-50%) translateY(0);}
.notif-title{font-family:'Orbitron',sans-serif;font-size:0.52rem;letter-spacing:2px;
  color:var(--gold);text-transform:uppercase;margin-bottom:2px;}
.notif-body{font-family:'Rajdhani',sans-serif;font-size:0.82rem;font-weight:600;color:var(--text);}
</style>
</head>
<body>
<div class="top-bar">
  <div class="top-bar-inner">
    <h1>Hunter Stats</h1>
    <div style="display:flex;align-items:center;gap:8px;">
      <a href="index.html" class="back-btn">← PPL</a>
      <div class="rank-badge rank-E" id="rankBadge">RANK E</div>
    </div>
  </div>
</div>

<div class="scroll-area">
  <div class="tab-row">
    <button class="tab-btn active" onclick="switchTab('stats',this)">Stats</button>
    <button class="tab-btn" onclick="switchTab('quests',this)">Quests</button>
    <button class="tab-btn" onclick="switchTab('achievements',this)">Feats</button>
  </div>

  <!-- STATS TAB -->
  <div id="tab-stats" class="tab-content active">
    <div class="profile-card">
      <div class="profile-top">
        <div class="hunter-avatar">⚔️</div>
        <div>
          <div class="hunter-name">Victor</div>
          <div class="hunter-title" id="hunterTitle">Awakened Hunter</div>
        </div>
      </div>
      <div class="xp-label-row">
        <div class="xp-label">Total Power</div>
        <div class="xp-val" id="totalXpVal">0 XP</div>
      </div>
      <div class="overall-bar-wrap"><div class="overall-bar" id="overallBar" style="width:0%"></div></div>
      <div class="stat-grid">
        <div class="stat-mini"><div class="stat-mini-val" id="smStreak">0</div><div class="stat-mini-label">Streak</div></div>
        <div class="stat-mini"><div class="stat-mini-val" id="smSessions">0</div><div class="stat-mini-label">Sessions</div></div>
        <div class="stat-mini"><div class="stat-mini-val" id="smWeek">0</div><div class="stat-mini-label">This Week</div></div>
      </div>
    </div>
    <div class="section-label">Muscle Attributes</div>
    <div class="body-svg-wrap">
      <svg id="bodySvg" viewBox="0 0 320 580" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="rgba(74,158,255,0)"/>
            <stop offset="50%" stop-color="rgba(74,158,255,0.18)"/>
            <stop offset="100%" stop-color="rgba(74,158,255,0)"/>
          </linearGradient>
          <linearGradient id="bgPanelGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#07091a"/>
            <stop offset="100%" stop-color="#04050f"/>
          </linearGradient>
          <filter id="glow-sm" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="glow-md" x="-80%" y="-80%" width="260%" height="260%">
            <feGaussianBlur stdDeviation="5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="glow-lg" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur stdDeviation="9" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="bodyGlow" x="-30%" y="-5%" width="160%" height="110%">
            <feGaussianBlur stdDeviation="6" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- PANEL BACKGROUND -->
        <rect x="0" y="0" width="320" height="580" rx="10" fill="url(#bgPanelGrad)" stroke="#141830" stroke-width="1"/>
        <!-- corner accents -->
        <path d="M0,20 L0,0 L20,0" fill="none" stroke="rgba(74,158,255,0.4)" stroke-width="1.5"/>
        <path d="M300,0 L320,0 L320,20" fill="none" stroke="rgba(74,158,255,0.4)" stroke-width="1.5"/>
        <path d="M0,560 L0,580 L20,580" fill="none" stroke="rgba(74,158,255,0.2)" stroke-width="1"/>
        <path d="M300,580 L320,580 L320,560" fill="none" stroke="rgba(74,158,255,0.2)" stroke-width="1"/>
        <!-- grid -->
        <g opacity="0.04" stroke="#4a9eff" stroke-width="0.5">
          <line x1="107" y1="0" x2="107" y2="580"/>
          <line x1="213" y1="0" x2="213" y2="580"/>
          <line x1="0" y1="145" x2="320" y2="145"/>
          <line x1="0" y1="290" x2="320" y2="290"/>
          <line x1="0" y1="435" x2="320" y2="435"/>
        </g>

        <!-- ══════════════════════════════════
             ANIME BODY — proper V-taper anatomy
             Center X=160. Wide shoulders ~220px span.
             Narrow waist ~100px. Long torso ratio.
        ══════════════════════════════════ -->

        <!-- ── SHADOW / AMBIENT GLOW UNDER BODY ── -->
        <ellipse cx="160" cy="545" rx="55" ry="8" fill="rgba(74,158,255,0.08)" filter="url(#glow-md)"/>

        <!-- ── NECK ── -->
        <path d="M150,72 L152,86 Q156,90 160,91 Q164,90 168,86 L170,72 Z"
          fill="#0c1525" stroke="#1a2840" stroke-width="1"/>
        <!-- trapezius slope both sides -->
        <path d="M150,72 Q140,74 128,82 L132,90 Q140,82 150,80 Z" fill="#0c1525" stroke="#1a2840" stroke-width="0.8"/>
        <path d="M170,72 Q180,74 192,82 L188,90 Q180,82 170,80 Z" fill="#0c1525" stroke="#1a2840" stroke-width="0.8"/>

        <!-- ── HEAD — sharp anime jaw, high cheekbones ── -->
        <!-- skull -->
        <path d="M160,10 Q143,10 138,22 Q133,34 135,46 Q137,56 142,62 Q148,68 154,70 L160,71 L166,70 Q172,68 178,62 Q183,56 185,46 Q187,34 182,22 Q177,10 160,10 Z"
          fill="#0c1525" stroke="#1e2e48" stroke-width="1.2"/>
        <!-- sharp jaw / chin -->
        <path d="M148,64 Q152,72 156,75 Q158,77 160,77 Q162,77 164,75 Q168,72 172,64"
          fill="none" stroke="#1e2e48" stroke-width="1"/>
        <!-- cheekbone lines -->
        <line x1="138" y1="50" x2="144" y2="54" stroke="#1e2e48" stroke-width="0.6" opacity="0.7"/>
        <line x1="182" y1="50" x2="176" y2="54" stroke="#1e2e48" stroke-width="0.6" opacity="0.7"/>
        <!-- HAIR — swept back, angular Solo Leveling style -->
        <path d="M138,22 Q136,14 142,8 Q150,2 160,2 Q170,2 178,8 Q184,14 182,22
                 Q178,12 172,9 Q166,6 160,6 Q154,6 148,9 Q142,12 138,22 Z"
          fill="#060c1a" stroke="#0e1528" stroke-width="1"/>
        <!-- hair spikes/flow left -->
        <path d="M138,22 Q132,18 130,12 Q135,8 140,10 Q136,16 138,22 Z" fill="#060c1a" stroke="#0e1528" stroke-width="0.7"/>
        <path d="M136,28 Q128,22 126,14 Q131,12 135,16 Q132,22 136,28 Z" fill="#060c1a" stroke="#0e1528" stroke-width="0.7"/>
        <!-- hair right -->
        <path d="M182,22 Q188,18 190,12 Q185,8 180,10 Q184,16 182,22 Z" fill="#060c1a" stroke="#0e1528" stroke-width="0.7"/>
        <!-- EYES — glowing blue, narrow and intense -->
        <path d="M143,42 Q148,39 154,40 Q151,44 145,44 Z" fill="#08121e" stroke="#1a2c48" stroke-width="0.6"/>
        <path d="M177,42 Q172,39 166,40 Q169,44 175,44 Z" fill="#08121e" stroke="#1a2c48" stroke-width="0.6"/>
        <ellipse id="eye-l" cx="149" cy="42" rx="4" ry="2.2" fill="#1a5aaa" opacity="0.5"/>
        <ellipse id="eye-r" cx="171" cy="42" rx="4" ry="2.2" fill="#1a5aaa" opacity="0.5"/>
        <!-- eye highlights -->
        <ellipse cx="147" cy="41" rx="1.2" ry="0.7" fill="#8acfff" opacity="0.4"/>
        <ellipse cx="169" cy="41" rx="1.2" ry="0.7" fill="#8acfff" opacity="0.4"/>
        <!-- nose bridge -->
        <path d="M160,48 L158,58 Q160,60 162,58 L160,48" fill="none" stroke="#1a2840" stroke-width="0.7"/>
        <!-- mouth — stern line -->
        <line x1="154" y1="64" x2="166" y2="64" stroke="#1a2840" stroke-width="0.9"/>

        <!-- ══ SHOULDERS — wide, rounded deltoid caps ══ -->
        <!-- Left delt — wider than old version, proper roundness -->
        <path id="mr-shoulders" class="mregion"
          d="M128,82 Q114,84 106,94 Q100,104 102,116 Q106,124 114,122 Q122,118 126,108 Q130,96 130,84 Z"
          fill="#0d1628" stroke="#1a2840" stroke-width="1.2"/>
        <!-- Right delt -->
        <path id="mr-shoulders-r" class="mregion"
          d="M192,82 Q206,84 214,94 Q220,104 218,116 Q214,124 206,122 Q198,118 194,108 Q190,96 190,84 Z"
          fill="#0d1628" stroke="#1a2840" stroke-width="1.2"/>

        <!-- ══ CHEST — wide pec slabs with clear sternal line ══ -->
        <!-- Left pec -->
        <path id="mr-chest" class="mregion"
          d="M130,86 Q144,80 160,80 L160,118 Q148,122 136,116 Q128,110 128,100 Z"
          fill="#0d1628" stroke="#1a2840" stroke-width="1.2"/>

<script>
// ─── DATA ───
var STORE='ppl_v3';
function getData(){try{return JSON.parse(localStorage.getItem(STORE)||'{}');}catch(e){return {};}}

// Migrate legacy { type:'push', rest:false } → { types:['push'], rest:false }
function getEntry(data,ds){
  var e=data[ds];
  if(!e)return null;
  if(e.rest)return{types:[],rest:true};
  if(!e.types&&e.type)e.types=[e.type];
  if(!e.types)e.types=[];
  return e;
}

// ─── MUSCLES ───
var MUSCLES=[
  {id:'chest',      name:'Chest',     day:'push',color:'#e85d26',side:'left', bodyXY:[160, 96], regions:['mr-chest']},
  {id:'back',       name:'Back',      day:'pull',color:'#2688e8',side:'left', bodyXY:[122,112], regions:['mr-back-l','mr-back-r']},
  {id:'biceps',     name:'Biceps',    day:'pull',color:'#4aacff',side:'left', bodyXY:[112,136], regions:['mr-biceps-l','mr-biceps-r']},
  {id:'quads',      name:'Quads',     day:'legs',color:'#26c47a',side:'left', bodyXY:[120,294], regions:['mr-quads-l','mr-quads-r']},
  {id:'calves',     name:'Calves',    day:'legs',color:'#80ffbc',side:'left', bodyXY:[116,392], regions:['mr-calves-l','mr-calves-r']},
  {id:'shoulders',  name:'Shoulders', day:'push',color:'#ff7a40',side:'right',bodyXY:[198, 90], regions:['mr-shoulders','mr-shoulders-r']},
  {id:'triceps',    name:'Triceps',   day:'push',color:'#ffaa60',side:'right',bodyXY:[208,136], regions:['mr-triceps-l','mr-triceps-r']},
  {id:'forearms',   name:'Forearms',  day:'pull',color:'#60c8ff',side:'right',bodyXY:[214,196], regions:['mr-forearms-l','mr-forearms-r']},
  {id:'core',       name:'Core',      day:'abs', color:'#e8c426',side:'right',bodyXY:[160,144], regions:['mr-core']},
  {id:'glutes',     name:'Glutes',    day:'legs',color:'#44e896',side:'right',bodyXY:[196,230], regions:['mr-glutes-l','mr-glutes-r']},
  {id:'hamstrings', name:'Hams',      day:'legs',color:'#26c47a',side:'right',bodyXY:[188,294], regions:['mr-hams-l','mr-hams-r']},
];

var DAY_MUSCLES={
  push:['chest','shoulders','triceps'],
  pull:['back','biceps','forearms'],
  legs:['quads','hamstrings','glutes','calves'],
  abs:['core']
};

// ─── XP / LEVEL ───
function xpForLevel(l){if(l<=1)return 0;return Math.round(30*(l-1)+10*(l-1)*(l-2));}
function levelFromXp(xp){var l=1;while(xpForLevel(l+1)<=xp)l++;return Math.min(l,99);}
function xpProgress(xp){var l=levelFromXp(xp);if(l>=99)return{cur:1,need:1,pct:100};var s=xpForLevel(l),e=xpForLevel(l+1);return{cur:xp-s,need:e-s,pct:Math.round((xp-s)/(e-s)*100)};}

// ─── RANKS ───
var RANKS=[
  {rank:'E',min:0,  label:'Rank E',cls:'rank-E',title:'Awakened Hunter'},
  {rank:'D',min:10, label:'Rank D',cls:'rank-D',title:'Iron-Grade Hunter'},
  {rank:'C',min:25, label:'Rank C',cls:'rank-C',title:'Bronze-Grade Hunter'},
  {rank:'B',min:50, label:'Rank B',cls:'rank-B',title:'Silver-Grade Hunter'},
  {rank:'A',min:90, label:'Rank A',cls:'rank-A',title:'Gold-Grade Hunter'},
  {rank:'S',min:150,label:'Rank S',cls:'rank-S',title:'Shadow Sovereign'},
];
function getRank(n){var r=RANKS[0];RANKS.forEach(function(x){if(n>=x.min)r=x;});return r;}

// ─── COMPUTE ───
function pad(n){return n<10?'0'+n:''+n;}
function toDS(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}

function computeStats(){
  var data=getData();
  var counts={};MUSCLES.forEach(function(m){counts[m.id]=0;});
  var today=new Date();today.setHours(0,0,0,0);
  var allDates=Object.keys(data).filter(function(k){var e=getEntry(data,k);return e&&!e.rest&&e.types&&e.types.length;}).sort();
  var dateSet={};allDates.forEach(function(k){dateSet[k]=true;});
  var totalSessions=allDates.length;
  var streak=0,check=new Date(today);
  while(true){var ds=toDS(check);if(dateSet[ds]){streak++;check.setDate(check.getDate()-1);}else if(ds===toDS(today)){check.setDate(check.getDate()-1);}else break;}
  var dow=(today.getDay()+6)%7,wk=0;
  for(var i=0;i<=dow;i++){var d=new Date(today);d.setDate(today.getDate()-i);if(dateSet[toDS(d)])wk++;}
  allDates.forEach(function(ds){
    var e=getEntry(data,ds);
    if(e&&!e.rest&&e.types)e.types.forEach(function(t){
      if(DAY_MUSCLES[t])DAY_MUSCLES[t].forEach(function(mid){counts[mid]=(counts[mid]||0)+1;});
    });
  });
  return{counts,totalSessions,streak,weekSessions:wk,data,allDates,dateSet};
}

// ─── COLOR ───
function hexToRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function blend(a,b,t){var ac=hexToRgb(a),bc=hexToRgb(b);return'rgb('+Math.round(ac[0]+(bc[0]-ac[0])*t)+','+Math.round(ac[1]+(bc[1]-ac[1])*t)+','+Math.round(ac[2]+(bc[2]-ac[2])*t)+')';}
function rgba(hex,a){var c=hexToRgb(hex);return'rgba('+c[0]+','+c[1]+','+c[2]+','+a+')';}

// ─── SVG UTILS ───
function svgEl(tag,attrs){var el=document.createElementNS('http://www.w3.org/2000/svg',tag);Object.keys(attrs).forEach(function(k){el.setAttribute(k,attrs[k]);});return el;}

// ─── LABEL LAYOUT ───
var LEFT_ORDER =['chest','back','biceps','quads','calves'];
var RIGHT_ORDER=['shoulders','triceps','forearms','core','glutes','hamstrings'];
var LW=88,LH=34,LR=5;
var LX_L=4,LX_R=228;
var SVG_H=560,PAD_T=28,PAD_B=50;

function labelY(side,idx){
  var count=side==='left'?LEFT_ORDER.length:RIGHT_ORDER.length;
  var avail=SVG_H-PAD_T-PAD_B;
  var step=avail/count;
  return PAD_T+step*idx+step/2-LH/2;
}

function buildLabel(m,lvl,prog,ly){
  var g=document.getElementById('label-'+m.id);
  while(g.firstChild)g.removeChild(g.firstChild);
  var isL=m.side==='left';
  var lx=isL?LX_L:LX_R;
  var active=lvl>=1;
  var col=m.color;
  var borderA=active?0.5:0.15;
  var bgA=active?0.1:0.04;
  var textCol=active?col:'#2a3560';

  // glow rect behind (for active)
  if(active&&lvl>=5){
    var gRect=svgEl('rect',{x:lx-2,y:ly-2,width:LW+4,height:LH+4,rx:LR+2,
      fill:rgba(col,0.07),filter:'url(#glow-sm)'});
    g.appendChild(gRect);
  }

  // background
  var rect=svgEl('rect',{x:lx,y:ly,width:LW,height:LH,rx:LR,
    fill:rgba(col,bgA),stroke:rgba(col,borderA),'stroke-width':'1'});
  g.appendChild(rect);

  // name
  var tx=isL?lx+LW-7:lx+7;
  var anchor=isL?'end':'start';
  var nameEl=svgEl('text',{x:tx,y:ly+12,'text-anchor':anchor,fill:textCol,
    'font-family':'Orbitron, sans-serif','font-size':'7','font-weight':'700','letter-spacing':'0.8'});
  nameEl.textContent=m.name.toUpperCase();
  g.appendChild(nameEl);

  // level
  var lvlEl=svgEl('text',{x:tx,y:ly+21,'text-anchor':anchor,
    fill:active?'rgba(200,216,240,0.8)':'#202840',
    'font-family':'Orbitron, sans-serif','font-size':'6','font-weight':'400','letter-spacing':'0.5'});
  lvlEl.textContent='LV '+lvl+(lvl>=20?' ★':lvl>=10?' ◆':'');
  g.appendChild(lvlEl);

  // xp bar bg
  var bp=6,bw=LW-bp*2,barY=ly+LH-8;
  g.appendChild(svgEl('rect',{x:lx+bp,y:barY,width:bw,height:2.5,rx:1.25,fill:'rgba(10,15,40,0.8)'}));
  var fill=svgEl('rect',{x:lx+bp,y:barY,width:0,height:2.5,rx:1.25,
    fill:active?col:'rgba(30,40,80,0.5)',opacity:active?'1':'0.4'});
  g.appendChild(fill);
  setTimeout(function(){fill.setAttribute('width',Math.round(bw*prog.pct/100));},100);

  // connector
  buildConnector(m,lvl,ly,lx,isL);
}

function buildConnector(m,lvl,ly,lx,isL){
  var old=document.getElementById('conn-'+m.id);
  if(old)old.parentNode.removeChild(old);
  var active=lvl>=1;
  var col=active?m.color:'#1a2450';
  var alpha=active?0.6:0.15;
  var cg=svgEl('g',{id:'conn-'+m.id});
  var midY=ly+LH/2;
  var edgeX=isL?lx+LW:lx;
  var bx=m.bodyXY[0],by=m.bodyXY[1];
  // L-shaped connector: horizontal then angled to body
  var elbowX=isL?edgeX+18:edgeX-18;
  var pts=isL
    ?(edgeX+','+midY+' '+elbowX+','+midY+' '+bx+','+by)
    :(edgeX+','+midY+' '+elbowX+','+midY+' '+bx+','+by);

  // glow version of line for active
  if(active){
    var glowLine=svgEl('polyline',{points:pts,stroke:col,'stroke-width':'2.5',
      'stroke-opacity':'0.2',fill:'none',filter:'url(#glow-sm)'});
    cg.appendChild(glowLine);
  }

  var line=svgEl('polyline',{points:pts,stroke:col,'stroke-width':'1',
    'stroke-opacity':alpha,'stroke-dasharray':active?'none':'3,3',fill:'none'});
  cg.appendChild(line);

  // arrowhead at body end
  var angle=Math.atan2(by-midY,bx-elbowX);
  var ax1=bx-7*Math.cos(angle-0.4),ay1=by-7*Math.sin(angle-0.4);
  var ax2=bx-7*Math.cos(angle+0.4),ay2=by-7*Math.sin(angle+0.4);
  var arrow=svgEl('polygon',{
    points:bx+','+by+' '+ax1+','+ay1+' '+ax2+','+ay2,
    fill:col,opacity:active?alpha+0.2:0.1});
  cg.appendChild(arrow);

  // dot at body anchor
  var dot=svgEl('circle',{cx:bx,cy:by,r:active?'3':'2',
    fill:col,opacity:active?'0.8':'0.2'});
  if(active&&lvl>=10){dot.setAttribute('filter','url(#glow-sm)');}
  cg.appendChild(dot);

  document.getElementById('connectors').appendChild(cg);
}

// ─── REGION FILL ── muscles grow and glow as you level ───
function applyRegion(m,lvl){
  var t=Math.min(lvl/25,1);
  // even at level 0 the body should look defined — use a visible dark tint from the muscle color
  var baseFill=blend('#0e1830',m.color,0.08+t*0.55);
  var baseStroke=rgba(m.color,0.22+t*0.42);
  var strokeW=(1.2+t*1.8).toFixed(1);
  var baseOpacity=(0.82+t*0.18).toFixed(2);
  var filterAttr=lvl>=20?'url(#glow-lg)':lvl>=10?'url(#glow-md)':lvl>=5?'url(#glow-sm)':'none';
  m.regions.forEach(function(rid){
    var el=document.getElementById(rid);if(!el)return;
    el.setAttribute('fill',baseFill);
    el.setAttribute('opacity',baseOpacity);
    el.setAttribute('stroke',baseStroke);
    el.setAttribute('stroke-width',strokeW);
    if(lvl>=5)el.setAttribute('filter',filterAttr);
    else el.removeAttribute('filter');
  });

  // abs lines always visible, brighten as core levels
  if(m.id==='core'){
    var al=document.getElementById('abs-lines');
    if(al){
      al.setAttribute('opacity',(0.28+t*0.55).toFixed(2));
      al.setAttribute('stroke',lvl>=5?m.color:'#2a3a5a');
    }
  }
}

// ─── RENDER STATS ───
function renderStats(){
  var s=computeStats();
  var rank=getRank(s.totalSessions);
  document.getElementById('rankBadge').textContent=rank.label;
  document.getElementById('rankBadge').className='rank-badge '+rank.cls;
  document.getElementById('hunterTitle').textContent=rank.title;
  document.getElementById('smStreak').textContent=s.streak;
  document.getElementById('smSessions').textContent=s.totalSessions;
  document.getElementById('smWeek').textContent=s.weekSessions;

  var totalXp=0;
  MUSCLES.forEach(function(m){totalXp+=(s.counts[m.id]||0)*10;});
  document.getElementById('totalXpVal').textContent=totalXp.toLocaleString()+' XP';

  var ni=RANKS.indexOf(rank)+1,oPct=100;
  if(ni<RANKS.length){var f=rank.min,t=RANKS[ni].min;oPct=Math.round((s.totalSessions-f)/(t-f)*100);}
  setTimeout(function(){document.getElementById('overallBar').style.width=oPct+'%';},80);

  // eye glow scales with total sessions
  var eyeI=Math.min(s.totalSessions/100,1);
  ['eye-l','eye-r'].forEach(function(id){
    var el=document.getElementById(id);
    if(el){el.setAttribute('opacity',(0.2+eyeI*0.8).toFixed(2));
      if(eyeI>0.5)el.setAttribute('filter','url(#glow-sm)');}
  });

  var lIdx=0,rIdx=0;
  MUSCLES.forEach(function(m){
    var xp=(s.counts[m.id]||0)*10;
    var lvl=levelFromXp(xp);
    var prog=xpProgress(xp);
    var idx=m.side==='left'?lIdx++:rIdx++;
    buildLabel(m,lvl,prog,labelY(m.side,idx));
    applyRegion(m,lvl);
  });
}

// ─── QUESTS ───
function countUniquePPL(s){
  var today=new Date();today.setHours(0,0,0,0);
  var dow=(today.getDay()+6)%7,types={};
  for(var i=0;i<=dow;i++){var d=new Date(today);d.setDate(today.getDate()-i);
    var ds=toDS(d);var e=getEntry(s.data,ds);
    if(e&&!e.rest&&e.types)e.types.forEach(function(t){if(t!=='abs')types[t]=true;});}
  return Object.keys(types).length;
}
function questCard(name,type,desc,cur,target,reward,done){
  var pct=Math.min(100,Math.round(cur/target*100));
  return'<div class="quest-card '+(done?'complete-quest':'active-quest')+'">'
    +'<div class="quest-header"><div class="quest-name">'+(done?'✓ ':'')+name+'</div><div class="quest-type '+type+'">'+type+'</div></div>'
    +'<div class="quest-desc">'+desc+'</div>'
    +'<div class="quest-prog-row"><div class="quest-bar-wrap"><div class="quest-bar'+(done?' done':'')+'" style="width:'+pct+'%"></div></div><div class="quest-pct">'+Math.min(cur,target)+'/'+target+'</div></div>'
    +'<div class="quest-reward">★ '+reward+'</div></div>';
}
function renderQuests(){
  var s=computeStats();
  var tk=toDS((function(){var d=new Date();d.setHours(0,0,0,0);return d;})());
  var te=getEntry(s.data,tk);var tl=te&&!te.rest&&te.types&&te.types.length?1:0;
  document.getElementById('dailyQuests').innerHTML=
    questCard('Daily Training','daily','Complete today\'s workout.',tl,1,'+ 50 XP',tl>=1)
    +questCard('Keep the Streak','daily','Don\'t break the chain.',Math.min(s.streak,1),1,'+ 25 XP',s.streak>=1);
  var uppl=countUniquePPL(s);
  document.getElementById('weeklyQuests').innerHTML=
    questCard('3 Sessions','weekly','3 sessions this week.',s.weekSessions,3,'+ 150 XP',s.weekSessions>=3)
    +questCard('Full PPL Cycle','weekly','Push, Pull and Legs in one week.',uppl,3,'+ 200 XP',uppl>=3)
    +questCard('4 Sessions','weekly','4+ sessions this week.',s.weekSessions,4,'+ 300 XP',s.weekSessions>=4);
  var ms=[
    {n:'First Blood',d:'Log your first session.',t:1,c:s.totalSessions,r:'Awakened'},
    {n:'10-Session Gate',d:'10 total sessions.',t:10,c:s.totalSessions,r:'Rank D'},
    {n:'Iron Will',d:'7-day streak.',t:7,c:s.streak,r:'+ 500 XP'},
    {n:'25 Sessions',d:'25 total sessions.',t:25,c:s.totalSessions,r:'Rank C'},
    {n:'Dungeon Breaker',d:'14-day streak.',t:14,c:s.streak,r:'+ 1000 XP'},
    {n:'50 Sessions',d:'50 total sessions.',t:50,c:s.totalSessions,r:'Rank B'},
    {n:'Shadow Runner',d:'30-day streak.',t:30,c:s.streak,r:'+ 2000 XP'},
    {n:'Century Hunter',d:'100 total sessions.',t:100,c:s.totalSessions,r:'+ 5000 XP'},
    {n:'Arise',d:'150 sessions.',t:150,c:s.totalSessions,r:'Rank S'},
  ];
  document.getElementById('milestoneQuests').innerHTML=ms.map(function(m){return questCard(m.n,'milestone',m.d,m.c,m.t,'+ '+m.r,m.c>=m.t);}).join('');
}

// ─── ACHIEVEMENTS ───
var ACHIEVEMENTS=[
  {id:'first', icon:'🌟',name:'Arise',          desc:'Log your first workout.',      check:function(s){return s.totalSessions>=1;}},
  {id:'s3',    icon:'🔥',name:'Three-Day Flame', desc:'3-day streak.',                check:function(s){return s.streak>=3;}},
  {id:'s7',    icon:'⚡',name:'Iron Resolve',    desc:'7-day streak.',                check:function(s){return s.streak>=7;}},
  {id:'s14',   icon:'💎',name:'Dungeon Clearer', desc:'14 consecutive days.',         check:function(s){return s.streak>=14;}},
  {id:'s30',   icon:'👑',name:'Shadow Monarch',  desc:'30 consecutive days.',         check:function(s){return s.streak>=30;}},
  {id:'n10',   icon:'🗡️',name:'First Gate',      desc:'10 total sessions.',           check:function(s){return s.totalSessions>=10;}},
  {id:'n25',   icon:'⚔️',name:'Gate Breaker',    desc:'25 total sessions.',           check:function(s){return s.totalSessions>=25;}},
  {id:'n50',   icon:'🛡️',name:'S-Grade Dungeon', desc:'50 total sessions.',           check:function(s){return s.totalSessions>=50;}},
  {id:'n100',  icon:'🌑',name:'Shadow Army',     desc:'100 total sessions.',          check:function(s){return s.totalSessions>=100;}},
  {id:'ppl',   icon:'🎯',name:'Complete System', desc:'Push, Pull and Legs in one week.',check:function(s){return countUniquePPL(s)>=3;}},
  {id:'lv10',  icon:'📈',name:'Attribute Surge', desc:'Any muscle at Level 10+.',    check:function(s){return MUSCLES.some(function(m){return levelFromXp((s.counts[m.id]||0)*10)>=10;});}},
  {id:'lv20',  icon:'🔮',name:'Elite Training',  desc:'Any muscle at Level 20+.',    check:function(s){return MUSCLES.some(function(m){return levelFromXp((s.counts[m.id]||0)*10)>=20;});}},
  {id:'bal',   icon:'⚖️',name:'Balanced Hunter', desc:'All muscles at Level 3+.',    check:function(s){return MUSCLES.every(function(m){return levelFromXp((s.counts[m.id]||0)*10)>=3;});}},
  {id:'wk4',   icon:'🌀',name:'Weekly Grind',    desc:'4+ sessions in one week.',    check:function(s){return s.weekSessions>=4;}},
];
var _ach={};try{_ach=JSON.parse(localStorage.getItem('hunter_ach')||'{}');}catch(e){}
function renderAchievements(){
  var s=computeStats();var html='';var fresh=[];
  ACHIEVEMENTS.forEach(function(a){
    var ok=a.check(s);if(ok&&!_ach[a.id]){fresh.push(a);_ach[a.id]=true;}
    html+='<div class="achievement '+(ok?'unlocked':'locked')+'">'
      +'<div class="ach-icon">'+a.icon+'</div>'
      +'<div class="ach-body"><div class="ach-name">'+a.name+'</div><div class="ach-desc">'+a.desc+'</div></div>'
      +'<div class="ach-right '+(ok?'ach-check':'ach-lock')+'">'+(ok?'✓':'🔒')+'</div></div>';
  });
  document.getElementById('achievementGrid').innerHTML=html;
  try{localStorage.setItem('hunter_ach',JSON.stringify(_ach));}catch(e){}
  if(fresh.length){var i=0;(function loop(){if(i>=fresh.length)return;showNotif(fresh[i].icon+' '+fresh[i].name);i++;setTimeout(loop,2800);})();}
}

// ─── TABS ───
function switchTab(id,btn){
  document.querySelectorAll('.tab-content').forEach(function(el){el.classList.remove('active');});
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('tab-'+id).classList.add('active');btn.classList.add('active');
  if(id==='stats')renderStats();
  else if(id==='quests')renderQuests();
  else if(id==='achievements')renderAchievements();
}

// ─── NOTIF ───
var _nt;
function showNotif(msg){
  var el=document.getElementById('notif');
  document.getElementById('notifBody').textContent=msg;
  el.classList.add('show');clearTimeout(_nt);
  _nt=setTimeout(function(){el.classList.remove('show');},2600);
}

// ─── INIT ───
renderStats();
</script>
